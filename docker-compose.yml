version: '3.8'

services:
  # ─── Backend Trading Engine ────────────────────────────────────
  migi-engine:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: migi-signals-engine
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DERIV_API_TOKEN=${DERIV_API_TOKEN}
      - DERIV_APP_ID=${DERIV_APP_ID:-1089}
      - DERIV_SYMBOL=${DERIV_SYMBOL:-1HZ10V}
      - WS_PORT=8080
      - BASE_STAKE=${BASE_STAKE:-1.00}
      - TARGET_PROFIT=${TARGET_PROFIT:-50}
      - STOP_LOSS=${STOP_LOSS:-20}
      - MAX_CONSECUTIVE_LOSSES=${MAX_CONSECUTIVE_LOSSES:-7}
      - SIMULATOR_MODE=${SIMULATOR_MODE:-true}
      - DATABASE_URL=file:./data/migi.db
    volumes:
      - migi-data:/app/data
    networks:
      - migi-net

  # ─── Nginx WSS Reverse Proxy (HTTPS → WS) ─────────────────────
  nginx-proxy:
    image: nginx:alpine
    container_name: migi-signals-proxy
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - nginx-ssl:/etc/nginx/ssl
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      - migi-engine
    networks:
      - migi-net

  # ─── Frontend (self-hosted, HTTP — no mixed content) ──────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: migi-signals-frontend
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://134.122.102.195:8080
    networks:
      - migi-net

volumes:
  migi-data:
  nginx-ssl:

networks:
  migi-net:
    driver: bridge
